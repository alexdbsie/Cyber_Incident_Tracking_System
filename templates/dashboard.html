<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Cyber Incident System</span>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">Dashboard</h2>

    <div class="row">

        
        <div class="col-md-6">
            <div class="card shadow p-3">
                <img src="https://cdn-icons-png.flaticon.com/512/2910/2910791.png" width="80">
                <h4 class="mt-3">Report Incident</h4>
                <p>Submit a new cyber security incident.</p>
                <a href="/report_page" class="btn btn-primary w-100">Go</a>
            </div>
        </div>

    
        <div class="col-md-6">
            <div class="card shadow p-3">
                <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" width="80">
                <h4 class="mt-3">View Incidents</h4>
                <p>Check all reported incidents.</p>
                <a href="/view" class="btn btn-success">Go</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>

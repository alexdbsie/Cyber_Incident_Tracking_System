<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    background:black;
    font-family:'Courier New', monospace;
    color: #00ffcc;
}

.container {
    text-align:center;
    margin-top:80px;
}

.card {
    background:rgba(10,15,30,0.9);
    padding:30px;
    border-radius:10px;
    width:300px;
    margin:auto;
    border:1px solid  #00ffcc;
    box-shadow:0 0 20px  #00ffcc;
}

button, a {
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
    text-decoration:none;
    border:1px solid  #00ffcc;
    color: #00ffcc;
    background:transparent;
}

button:hover, a:hover {
    background:#00ffcc;
    color:black;
}
</style>
</head>

<body>

<div class="container">
    <h1>Cyber Incident Dashboard</h1>

    <div style="margin-bottom:20px;">
        <h3>Total Incidents: {{ total }}</h3>
        <h4 style="color:red;">High: {{ high }}</h4>
        <h4 style="color:orange;">Medium: {{ medium }}</h4>
        <h4 style="color:green;">Low: {{ low }}</h4>
    </div>

    <div class="card">
        <p>Select an option</p>

        <a href="/report_page">Report Incident</a>
        <a href="/view">View Incidents</a>
        <a href="/api/incidents">API View</a>
        <a href="/logout">Logout</a>
    </div>
</div>

</body>
</html>

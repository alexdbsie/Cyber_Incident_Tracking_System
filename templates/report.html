    <nav>
        <span class="brand">Cyber Incident System</span>
        <a href="/dashboard" class="nav-link">← Dashboard</a>
    </nav>

    <div class="page-body">
    <h1>Report Incident</h1>

    <div class="card">
        <form method="POST" action="/report">

            <label for="title">Incident Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. Unauthorized access attempt" required>

            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe what happened..." required></textarea>

            <label for="severity">Severity Level</label>
            <select id="severity" name="severity">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <div class="btn-row">
                <button type="submit">Submit Report</button>
            </div>

        </form>
    </div>

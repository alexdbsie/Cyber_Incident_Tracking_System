<!DOCTYPE html>
<html>
<head>
    <title>Report Incident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-3">Report Incident</h3>

        <form method="POST" action="/report">

            <input type="text" name="title" class="form-control mb-3" placeholder="Incident Title" required>

            <textarea name="description" class="form-control mb-3" placeholder="Description" required></textarea>

            <select name="severity" class="form-control mb-3">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <input type="date" name="date" class="form-control mb-3" required>

            <button class="btn btn-danger w-100">Submit</button>
        </form>

    </div>

</div>

</body>
</html>

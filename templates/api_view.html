<!DOCTYPE html>
<html>
<head>
    <title>API Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: black;
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 30px;
            border-bottom: 1px solid #00ffcc33;
            background: rgba(10, 15, 30, 0.95);
            width: 100%;
        }

        nav .brand {
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 8px #00ffcc;
        }

        nav a.nav-link {
            font-size: 0.85rem;
            color: #00ffcc;
            text-decoration: none;
            border: 1px solid #00ffcc;
            padding: 7px 16px;
            border-radius: 6px;
            letter-spacing: 0.05em;
            transition: background 0.2s, color 0.2s;
        }

        nav a.nav-link:hover {
            background: #00ffcc;
            color: black;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 24px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #00ffcc88;
            margin-bottom: 30px;
            letter-spacing: 0.05em;
        }

        .code-card {
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid #00ffcc;
            box-shadow: 0 0 25px #00ffcc33;
            border-radius: 10px;
            overflow: hidden;
        }

        .code-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #00ffcc33;
            background: rgba(0, 255, 204, 0.05);
        }

        .code-card-header span {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: #00ffcc99;
            text-transform: uppercase;
        }

        .dot-row {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ffcc22;
            border: 1px solid #00ffcc55;
        }

        pre {
            margin: 0;
            padding: 24px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #00ffcccc;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .key     { color: #00ffff; }
        .string  { color: #00ff88; }
        .number  { color: #ffd700; }
        .boolean { color: #ff9944; }
        .null    { color: #f08080; }

        .error-msg {
            color: #f08080;
            font-size: 0.85rem;
            border: 1px solid #e24b4a44;
            background: rgba(226, 75, 74, 0.1);
            padding: 12px 16px;
            border-radius: 6px;
            letter-spacing: 0.03em;
            margin: 20px 24px;
        }
    </style>
</head>

<body>

    <nav>
        <span class="brand">Cyber Incident System</span>
        <a href="/dashboard" class="nav-link">← Dashboard</a>
    </nav>

    <div class="container">

        <h1>API Response</h1>
        <p class="subtitle">Live JSON — Incidents Endpoint</p>

        <div class="code-card">
            <div class="code-card-header">
                <span>GET /api/incidents</span>
                <div class="dot-row">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div id="output"></div>
        </div>

    </div>

    <script>
        
        var rawData = {{ data | tojson | safe if data else '[]' }};

        function syntaxHighlight(obj) {
            var json = JSON.stringify(obj, null, 4);

            json = json.replace(/(&|<|>)/g, function (match) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[match];
            });

            return json.replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|\b-?\d+(\.\d+)?([eE][+-]?\d+)?\b)/g,
                function (match) {
                    var cls = 'number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'key' : 'string';
                    } else if (/true|false/.test(match)) {
                        cls = 'boolean';
                    } else if (/null/.test(match)) {
                        cls = 'null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                }
            );
        }

        var outputEl = document.getElementById('output');

        try {
            var pre = document.createElement('pre');
            pre.innerHTML = syntaxHighlight(rawData);
            outputEl.appendChild(pre);
        } catch (e) {
            outputEl.innerHTML = '<div class="error-msg">Failed to parse JSON data: ' + e.message + '</div>';
        }
    </script>

</body>
</html>

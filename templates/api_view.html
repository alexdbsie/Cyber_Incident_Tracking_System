<!DOCTYPE html>
<html>
<head>
    <title>API Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #1e1e2f;
            color: #00ffcc;
            font-family: monospace;
            padding: 20px;
        }
        pre {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }

        .key { color: #00ffff; }
        .string { color: #00ff88; }
        .number { color: #ffd700; }
        .boolean { color: orange; }
        .null { color: red; }

    </style>
</head>

<body>

<div style="margin: 20px;">
    <a href="/dashboard" class="btn btn-primary">
        Back to Dashboard
    </a>
</div>

<h2>API Response (Incidents)</h2>

<pre id="json-data"></pre>

<script>
const rawData = `{{ data | safe }}`;

function syntaxHighlight(json) {
    json = JSON.stringify(JSON.parse(json), null, 4);
    json = json.replace(/(&|<|>)/g, function (match) {
        return {'&': '&amp;', '<': '&lt;', '>': '&gt;'}[match];
    });

    return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\\s*:)?|\b(true|false|null)\b|\b\d+\b)/g,
        function (match) {
            let cls = "number";
            if (/^"/.test(match)) {
                if (/:$/.test(match)) cls = "key";
                else cls = "string";
            } else if (/true|false/.test(match)) {
                cls = "boolean";
            } else if (/null/.test(match)) {
                cls = "null";
            }
            return '<span class="' + cls + '">' + match + '</span>';
        }
    );
}

document.getElementById("json-data").innerHTML = syntaxHighlight(rawData);
</script>

</body>
</html>
